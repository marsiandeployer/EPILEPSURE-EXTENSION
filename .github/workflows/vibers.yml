name: Vibers Code Review
on:
  push:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: marsiandeployer/vibers-action@v1
        with:
          spec_url: 'https://github.com/agneloze/EPILEPSURE-EXTENSION' # Repository itself can serve as spec
          telegram_contact: '@user' # Change to your telegram
